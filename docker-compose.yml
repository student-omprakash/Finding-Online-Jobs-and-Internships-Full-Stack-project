# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Orchestrates all 3 services for local development:
#   - mongodb: local database (no Atlas needed for dev)
#   - backend: Node.js API
#   - frontend: React SPA served by nginx
#
# Usage:
#   Start:  docker-compose up --build
#   Stop:   docker-compose down
#   Logs:   docker-compose logs -f
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── MongoDB (Local Development DB) ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: careernest-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db  # Persist data across container restarts
    networks:
      - careernest-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careernest-backend
    restart: unless-stopped
    ports:
      - '5005:5005'
    env_file:
      - ./backend/.env  # Load environment variables from local .env file
    environment:
      # Override MONGO_URI to point to the Docker mongodb service above
      # (not localhost — inside Docker, services communicate by service name)
      - MONGO_URI=mongodb://mongodb:27017/careernest
      - PORT=5005
    depends_on:
      mongodb:
        condition: service_healthy  # Wait for MongoDB to be ready
    volumes:
      - backend_uploads:/app/uploads  # Persist uploaded files
    networks:
      - careernest-network

  # ── Frontend (React + Vite → nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5005/api  # Correct build arg matching frontend Dockerfile
    container_name: careernest-frontend
    restart: unless-stopped
    ports:
      - '3000:80'  # Map container port 80 (nginx) to host port 3000
    depends_on:
      - backend
    networks:
      - careernest-network

  # ── Prometheus (Monitoring Scraping Engine) ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: careernest-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - careernest-network

  # ── Grafana (Aesthetics & Analytics UI) ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: careernest-grafana
    restart: unless-stopped
    ports:
      - '4000:3000' # Map to port 4000 of host to avoid standard port conflicts
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/careernest_dashboard.json:/var/lib/grafana/dashboards/careernest_dashboard.json:ro
    depends_on:
      - prometheus
    networks:
      - careernest-network

# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  mongodb_data:     # MongoDB data persists across restarts
  backend_uploads:  # Uploaded files persist across restarts
  grafana_data:     # Grafana user settings and data persists

# ── Internal Network ────────────────────────────────────────────────────────
networks:
  careernest-network:
    driver: bridge
