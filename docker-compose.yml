# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Orchestrates all 3 services for local development:
#   - mongodb: local database (no Atlas needed for dev)
#   - backend: Node.js API
#   - frontend: React SPA served by nginx
#
# Usage:
#   Start:  docker-compose up --build
#   Stop:   docker-compose down
#   Logs:   docker-compose logs -f
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── MongoDB (Local Development DB) ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: careernest-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db  # Persist data across container restarts
    networks:
      - careernest-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careernest-backend
    restart: unless-stopped
    ports:
      - '5005:5005'
    env_file:
      - ./backend/.env  # Load environment variables from local .env file
    environment:
      # Override MONGO_URI to point to the Docker mongodb service above
      # (not localhost — inside Docker, services communicate by service name)
      - MONGO_URI=mongodb://mongodb:27017/careernest
      - PORT=5005
    depends_on:
      mongodb:
        condition: service_healthy  # Wait for MongoDB to be ready
    volumes:
      - backend_uploads:/app/uploads  # Persist uploaded files
    networks:
      - careernest-network

  # ── Frontend (React + Vite → nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5005  # Backend URL for local dev
    container_name: careernest-frontend
    restart: unless-stopped
    ports:
      - '3000:80'  # Map container port 80 (nginx) to host port 3000
    depends_on:
      - backend
    networks:
      - careernest-network

# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  mongodb_data:     # MongoDB data persists across restarts
  backend_uploads:  # Uploaded files persist across restarts

# ── Internal Network ────────────────────────────────────────────────────────
networks:
  careernest-network:
    driver: bridge
