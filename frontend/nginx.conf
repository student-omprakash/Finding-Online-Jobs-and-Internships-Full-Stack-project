# ─── nginx.conf ───────────────────────────────────────────────────────────────
# Serves the React SPA built by Vite.
# Handles client-side routing: any unknown path returns index.html
# so React Router can handle the navigation.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Root directory for built static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster load times
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Main SPA catch-all — serve index.html for all routes
    # This allows React Router to handle /dashboard, /login, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
