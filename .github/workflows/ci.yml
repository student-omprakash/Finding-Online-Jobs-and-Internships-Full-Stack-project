# ─── GitHub Actions CI Pipeline ───────────────────────────────────────────────
# Runs on every push or pull request to main or develop.
# Jobs: Lint frontend, Build frontend, Verify backend syntax
#
# If any job fails → the push is marked ❌ and you get an email alert.
# ──────────────────────────────────────────────────────────────────────────────

name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Job 1: Lint Frontend ─────────────────────────────────────────────────
  lint-frontend:
    name: 🔍 Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ── Job 2: Build Frontend ─────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend  # Only build if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5005' }}

      - name: Verify build output exists
        run: test -d frontend/dist && echo "✅ Build output found" || (echo "❌ Build output missing" && exit 1)

  # ── Job 3: Verify Backend ─────────────────────────────────────────────────
  verify-backend:
    name: ✅ Verify Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check Node.js syntax (dry run)
        working-directory: backend
        run: node --check src/index.js && echo "✅ Backend syntax OK"
