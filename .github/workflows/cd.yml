# ─── GitHub Actions CD Pipeline ───────────────────────────────────────────────
# Triggers ONLY when CI passes on the main branch.
# Automatically deploys backend and frontend to Render via deploy hooks.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   RENDER_BACKEND_DEPLOY_HOOK  — from Render backend service → Settings → Deploy Hook
#   RENDER_FRONTEND_DEPLOY_HOOK — from Render frontend service → Settings → Deploy Hook
# ──────────────────────────────────────────────────────────────────────────────

name: CD — Deploy to Render

on:
  push:
    branches: [main]  # Only deploy from main branch

# Prevent multiple concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ── Job 1: Deploy Backend to Render ─────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Backend Deploy
        run: |
          echo "🚀 Triggering backend deployment on Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Backend deployment triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Backend deployment trigger failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Wait for backend to become healthy
        run: |
          echo "⏳ Waiting 60 seconds for backend to deploy..."
          sleep 60

          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "ℹ️  RENDER_BACKEND_URL secret not set — skipping health check"
            exit 0
          fi

          echo "🔍 Checking backend health at $BACKEND_URL/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$BACKEND_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy! (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: Backend returned HTTP $STATUS — retrying in 30s..."
            sleep 30
          done

          echo "⚠️  Backend health check timed out — deployment may still be in progress"
          exit 0  # Don't fail CD for slow cold starts on Render free tier

  # ── Job 2: Deploy Frontend to Render ─────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend to Render
    runs-on: ubuntu-latest
    needs: deploy-backend  # Deploy frontend after backend is triggered

    steps:
      - name: Trigger Render Frontend Deploy
        run: |
          echo "🌐 Triggering frontend deployment on Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Frontend deployment triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Frontend deployment trigger failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 CareerNest Deployment Triggered!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Backend  → Render (deployment triggered)"
          echo "  Frontend → Render (deployment triggered)"
          echo ""
          echo "  Check Render dashboard for live status:"
          echo "  https://dashboard.render.com"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
