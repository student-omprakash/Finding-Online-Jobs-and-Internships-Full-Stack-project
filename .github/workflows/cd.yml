# ─── GitHub Actions CD Pipeline ───────────────────────────────────────────────
# Monitors deployment health after Render auto-deploys on every push to main.
#
# Render is configured with "Auto-Deploy: On Commit" for both services,
# so it automatically deploys whenever this pipeline pushes to main.
# This workflow monitors that the services become healthy after deploy.
#
# Required GitHub Secret (Settings → Secrets → Actions):
#   RENDER_BACKEND_URL — the backend service URL on Render
# ──────────────────────────────────────────────────────────────────────────────

name: CD — Deploy to Render

on:
  push:
    branches: [main]  # Only deploy from main branch

# Prevent multiple concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ── Verify Render Auto-Deploy is healthy ─────────────────────────────────────
  verify-deployment:
    name: 🚀 Verify Render Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Render auto-deploy to start
        run: |
          echo "⏳ Render auto-deploy triggered by this push to main..."
          echo "   Waiting 90 seconds for Render to pull latest code and deploy..."
          sleep 90

      - name: Health check — Backend
        run: |
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "ℹ️  RENDER_BACKEND_URL secret not set — skipping health check"
            exit 0
          fi

          echo "🔍 Checking backend health at $BACKEND_URL/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$BACKEND_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy! (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: Backend returned HTTP $STATUS — retrying in 30s..."
            sleep 30
          done

          echo "⚠️  Backend health check timed out — deployment may still be in progress on Render free tier (cold start)"
          exit 0  # Don't fail CD for slow cold starts on Render free tier

      - name: Deployment Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 CareerNest Deployment Pipeline Complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  Backend  → https://careernest-backend-r5rj.onrender.com"
          echo "  Frontend → https://careernest-frontendfinding-online-jobs.onrender.com"
          echo ""
          echo "  ℹ️  Render deploys automatically on every push to main."
          echo "  ℹ️  Check Render dashboard for live deployment status:"
          echo "      https://dashboard.render.com"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
